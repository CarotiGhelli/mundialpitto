<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Squadre - MundialPitto</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:ital,wght@0,800;0,900;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <a href="index.html" class="nav-brand">Torneo <span>MundialPitto</span></a>
        <div class="nav-links">
            <a href="index.html">Live & Risultati</a>
            <a href="squadre.html" class="active">Squadre</a>
            <a href="calendario.html">Calendario</a>
            <a href="classifica.html">Classifiche</a>
        </div>
        <div class="nav-spacer"></div>
    </nav>

    <div class="squadre-container">

        <header class="squadre-header">
            <h1>LE PROTAGONISTE</h1>
            <p>Le 6 squadre che si contendono il MundialPitto.</p>
        </header>

        <div class="teams-grid" id="teams-grid"></div>
    </div>

    <footer>
        <p>&copy; 2026 MundialPitto. Tutti i diritti riservati.</p>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <script src="script.js"></script>
    <script>
        // Renderizza le squadre nella griglia
        function renderSquadre() {
            const grid = document.getElementById('teams-grid');
            const html = squadreDB.map(squadra => {
                const crestContent = squadra.logo
                    ? `<img src="Loghi/${squadra.logo}" alt="${squadra.nome}" style="width:100%; height:100%; object-fit:contain; border-radius:8px;">`
                    : squadra.badge;
                const crestBg = squadra.logo ? 'background:#000;' : `background: linear-gradient(135deg, ${squadra.colore} 0%, ${squadra.coloreScuro} 100%);`;
                return `
                <a href="squadra-dettaglio.html?id=${squadra.id}" class="team-showcase-card" style="text-decoration: none; color: inherit;">
                    <div class="showcase-crest" style="${crestBg} box-shadow: 0 4px 15px ${squadra.colore}44;">
                        ${crestContent}
                    </div>
                    <div class="showcase-name">${squadra.nome}</div>
                    <div class="showcase-group">${squadra.girone}</div>
                    <div class="btn-roster">Vedi Rosa</div>
                </a>`;
            }).join('');
            grid.innerHTML = html;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await firebaseReady;
            renderSquadre();
        });
    </script>
</body>
</html>
